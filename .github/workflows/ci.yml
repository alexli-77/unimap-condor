name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Build
        run: npm run build
      - name: Test recommendations
        run: npm run test:recommendations
      - name: Test local rankings
        run: npm run test:local-rankings
      - name: Test ranking sources
        run: npm run test:ranking-sources
      - name: Test US decision facts
        run: npm run test:us-decision
      - name: Secret pattern scan
        run: |
          ! grep -RInE "(AIza[0-9A-Za-z_-]{20,}|sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN .*PRIVATE KEY-----)" \
            --exclude-dir=.git --exclude-dir=node_modules --exclude=package-lock.json --exclude=ci.yml .
          ! grep -RInEi "(api[_-]?key|secret|token|password|authorization|bearer)[[:space:]]*[:=][[:space:]]*['\"][^'\"]{8,}['\"]" \
            --exclude-dir=.git --exclude-dir=node_modules --exclude=package-lock.json --exclude=ci.yml .
